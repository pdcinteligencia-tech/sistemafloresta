<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCIPLINA</title>
    <meta name="description" content="Sistema web integral para el control disciplinario de estudiantes.">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- SweetAlert2 for modern alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill WYSIWYG Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>

<body>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="auth-wrapper hidden">
        <div class="card auth-card">
            <div class="auth-logo" style="margin-bottom: 1rem;">
                <img src="img/logo.png" alt="Logo PLENA &quot;LA FLORESTA&quot;"
                    style="max-width: 180px; height: auto; display: block; margin: 0 auto;">
            </div>
            <p class="auth-subtitle">Sistema de Control Disciplinario</p>

            <form id="login-form">
                <div id="login-error" class="alert-error hidden"></div>

                <div class="form-group text-left" style="text-align: left;">
                    <label>Usuario</label>
                    <input type="text" name="username" class="input" placeholder="Ingrese su usuario" required>
                </div>

                <div class="form-group text-left" style="text-align: left;">
                    <label>Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" name="password" class="input"
                            placeholder="Ingrese su contraseña" required>
                        <button type="button" id="toggle-password" class="btn-toggle-password"
                            title="Mostrar/Ocultar contraseña">
                            <svg id="icon-eye-closed" width="20" height="20" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                            <svg id="icon-eye-open" width="20" height="20" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" class="hidden">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar al
                    Sistema</button>
            </form>
            <p class="text-xs text-muted mt-2" style="opacity: 0.8; letter-spacing: 0.5px;">Desarrollado por ® Prof.
                Israel Condori Gonzales</p>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="app-section" class="app-layout hidden">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <img src="img/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
                <span>PLENA "LA FLORESTA"</span>
            </div>

            <div class="user-panel">
                <span class="text-sm text-gray">Bienvenido,</span>
                <span id="current-user" class="font-bold text-white">Profesor</span>
            </div>

            <nav class="sidebar-menu">
                <a href="#" class="active" data-view="dashboard">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    <span>Inicio / Panel</span>
                </a>
                <div class="sidebar-dropdown">
                    <a href="#" style="justify-content: space-between; cursor: pointer;" id="estudiantes-toggle">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                                </path>
                            </svg>
                            <span>Estudiantes</span>
                        </div>
                        <span id="estudiantes-arrow" style="font-size: 0.8rem; transition: transform 0.2s; transform: rotate(180deg);">▼</span>
                    </a>
                    <div id="estudiantes-submenu"
                        style="display: flex; flex-direction: column; background-color: #111827; padding-left: 1.5rem;">
                        <a href="#" data-view="students" data-level="Primario">
                            <svg class="mobile-icon" width="20" height="20" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                                </path>
                            </svg>
                            <span>Primaria</span>
                        </a>
                        <a href="#" data-view="students" data-level="Secundario">
                            <svg class="mobile-icon" width="20" height="20" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 14l9-5-9-5-9 5 9 5z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                                </path>
                            </svg>
                            <span>Secundaria</span>
                        </a>
                    </div>
                </div>
                <a href="#" data-view="regulations">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                    <span class="desktop-text-reglamento">Reglamento</span>
                    <span class="mobile-text-reglamento" style="display:none;">Normas</span>
                </a>
                <a href="#" data-view="reports">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    <span class="desktop-text-reglamento">Informes</span>
                    <span class="mobile-text-reglamento" style="display:none;">Reportes</span>
                </a>
                <a href="#" id="logout-btn-mobile" class="mobile-only-logout" style="display: none;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                    <span style="font-size: 0.7rem;">Salir</span>
                </a>
            </nav>

            <div class="brand" style="border-top: 1px solid #374151; border-bottom: none;">
                <button id="logout-btn" class="btn btn-sm btn-outline flex items-center justify-center gap-1"
                    style="width: 100%; color: #d1d5db; border-color: #4b5563;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">
            <header class="topbar">
                <h1 id="view-title">Cargando...</h1>
            </header>

            <div id="main-content" class="content-area">
                <!-- Dynamic Content Loading -->
            </div>
        </main>

    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
