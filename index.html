<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DISCIPLINARIO | Unidad Educativa PLENA "LA FLORESTA"</title>
    <meta name="description" content="Sistema web integral para el control disciplinario de estudiantes.">
    <link rel="stylesheet" href="css/style.css">
    <!-- SweetAlert2 for modern alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill WYSIWYG Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>

<body>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="auth-wrapper hidden">
        <div class="card auth-card">
            <div class="auth-logo" style="margin-bottom: 1rem;">
                <img src="img/logo.png" alt="Logo PLENA &quot;LA FLORESTA&quot;"
                    style="max-width: 180px; height: auto; display: block; margin: 0 auto;">
            </div>
            <p class="auth-subtitle">Sistema de Control Disciplinario</p>

            <form id="login-form">
                <div id="login-error" class="alert-error hidden"></div>

                <div class="form-group text-left" style="text-align: left;">
                    <label>Usuario</label>
                    <input type="text" name="username" class="input" placeholder="Ingrese su usuario" required>
                </div>

                <div class="form-group text-left" style="text-align: left;">
                    <label>Contraseña</label>
                    <input type="password" name="password" class="input" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar al
                    Sistema</button>
            </form>
            <p class="text-xs text-muted mt-2" style="opacity: 0.8; letter-spacing: 0.5px;">Desarrollado por ® Prof. Israel Condori Gonzales</p>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="app-section" class="app-layout hidden">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <img src="img/logo.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
                <span>PLENA "LA FLORESTA"</span>
            </div>

            <div class="user-panel">
                <span class="text-sm text-gray">Bienvenido,</span>
                <span id="current-user" class="font-bold text-white">Profesor</span>
            </div>

            <nav class="sidebar-menu">
                <a href="#" class="active" data-view="dashboard">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    Inicio / Panel
                </a>
                <div class="sidebar-dropdown">
                    <a href="#" style="justify-content: space-between; cursor: pointer;" id="estudiantes-toggle">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                                </path>
                            </svg>
                            Estudiantes
                        </div>
                        <span id="estudiantes-arrow" style="font-size: 0.8rem; transition: transform 0.2s;">▼</span>
                    </a>
                    <div id="estudiantes-submenu" class="hidden"
                        style="display: flex; flex-direction: column; background-color: #111827; padding-left: 1.5rem;">
                        <a href="#" data-view="students" data-level="Primario">Primario</a>
                        <a href="#" data-view="students" data-level="Secundario">Secundario</a>
                    </div>
                </div>
                <a href="#" data-view="regulations">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                    Reglamento
                </a>
            </nav>

            <div class="brand" style="border-top: 1px solid #374151; border-bottom: none;">
                <button id="logout-btn" class="btn btn-sm btn-outline flex items-center justify-center gap-1"
                    style="width: 100%; color: #d1d5db; border-color: #4b5563;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">
            <header class="topbar">
                <h1 id="view-title">Cargando...</h1>
            </header>

            <div id="main-content" class="content-area">
                <!-- Dynamic Content Loading -->
            </div>
        </main>

    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
